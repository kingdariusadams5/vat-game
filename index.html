<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LRA VAT Game</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(135deg,#0b3d91,#1452cc);
    color: white;
    margin:0;
}

.header {
    background:#002b7f;
    padding:10px;
}

.logo {
    width:70px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(12,30px);
    gap:4px;
    justify-content:center;
    margin:15px;
}

.cell {
    width:30px;
    height:30px;
    background:white;
    color:black;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    border-radius:6px;
    cursor:pointer;
    user-select:none;
}

.cell.selected { background: gold; }
.cell.found { background: limegreen; color:white; }
.cell.wrong { background: red; color:white; }

.info-box {
    background:#002b7f;
    padding:10px;
    border-radius:10px;
    display:inline-block;
}

#submitBox { display:none; margin-top:20px; }

input {
    padding:10px;
    width:220px;
    border-radius:6px;
    border:none;
}

button {
    padding:10px 20px;
    background:orange;
    border:none;
    border-radius:6px;
}

#leaderboard {
    margin:20px auto;
    background:white;
    color:black;
    padding:15px;
    border-radius:14px;
    width:90%;
    max-width:420px;
}

.player {
    display:flex;
    justify-content:space-between;
    padding:6px;
    border-bottom:1px solid #ddd;
}

@media (max-width:600px){
    .grid{
        grid-template-columns:repeat(12,24px);
        gap:3px;
    }
    .cell{
        width:24px;
        height:24px;
        font-size:12px;
    }
}
</style>
</head>

<body>

<div class="header">
<img src="lra-logo.png" class="logo">
<h2>LRA VAT Word Game</h2>
</div>

<div class="info-box">
⏱️ <span id="time">0</span>s |
🎯 Score: <span id="score">0</span> |
🎯 Attempts: <span id="attempts">10</span>
</div>

<div class="grid" id="grid"></div>

<p>Find: VAT, TAX, GOODS, SERVICES, INVOICE, REVENUE, PAYMENT, REGISTER, SALES, CUSTOMER</p>

<div id="submitBox">
<input id="name" placeholder="Full Name"><br><br>
<input id="phone" placeholder="Phone Number"><br><br>
<button onclick="submitScore()">Submit</button>
</div>

<!-- 🔒 HIDDEN ADMIN -->
<div id="adminBox" style="display:none; background:#fff; color:#000; padding:10px; border-radius:10px; max-width:300px; margin:20px auto;">
<h4>Admin Verify</h4>
<input id="codeInput" placeholder="Paste Code"><br><br>
<button onclick="verifyCode()">Verify</button>
<p id="result"></p>
</div>

<script>
const correctSound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
const wrongSound = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

const words=["VAT","TAX","GOODS","SERVICES","INVOICE","REVENUE","PAYMENT","REGISTER","SALES","CUSTOMER"];

const letters=[ /* unchanged */
"C","U","S","T","O","M","E","R","X","Y","Z","A",
"R","T","X","A","T","G","H","J","K","L","M","N",
"E","V","A","T","O","P","Q","R","S","T","U","V",
"C","W","X","Y","Z","G","O","O","D","S","A","B",
"E","R","T","Y","U","I","O","P","Q","R","C","D",
"I","N","V","O","I","C","E","L","M","N","E","F",
"P","O","I","U","Y","T","R","E","W","Q","I","G",
"T","R","E","G","I","S","T","E","R","H","V","H",
"S","A","L","E","S","D","F","G","H","I","R","I",
"E","D","C","B","A","Z","X","C","V","B","O","J",
"M","N","O","P","A","Y","M","E","N","T","K","K",
"O","L","K","J","H","G","F","D","S","A","E","L"
];

let score=0, attempts=10, found=[], selected=[];
let isDragging=false;
let gameOver=false;

// TIMER
let time=0;
setInterval(()=>{
 if(!gameOver){
  time++;
  document.getElementById("time").innerText=time;
 }
},1000);

const grid=document.getElementById("grid");

letters.forEach(l=>{
 let c=document.createElement("div");
 c.className="cell";
 c.innerText=l;

 c.onmousedown=()=>{if(!gameOver){isDragging=true;select(c)}};
 c.onmouseover=()=>{if(isDragging && !gameOver)select(c)};
 document.onmouseup=check;

 c.ontouchstart=(e)=>{
   if(gameOver) return;
   e.preventDefault();
   isDragging=true;
   select(c);
 };

 c.ontouchmove=(e)=>{
   if(gameOver) return;
   let t=e.touches[0];
   let el=document.elementFromPoint(t.clientX,t.clientY);
   if(el && el.classList.contains("cell")){
     select(el);
   }
 };

 document.ontouchend=check;

 grid.appendChild(c);
});

function select(cell){
 if(!cell.classList.contains("selected")){
  cell.classList.add("selected");
  selected.push(cell);
 }
}

function check(){
 if(gameOver) return;

 isDragging=false;
 if(selected.length===0) return;

 if(attempts <= 0){
    endGame();
    return;
 }

 let word=selected.map(c=>c.innerText).join("");

 attempts--;
 if(attempts < 0) attempts = 0;

 document.getElementById("attempts").innerText=attempts;

 if(words.includes(word) && !found.includes(word)){
  found.push(word);
  score+=10;
  document.getElementById("score").innerText=score;
  correctSound.play();

  selected.forEach(c=>{
   c.classList.remove("selected");
   c.classList.add("found");
  });

 } else {
  wrongSound.play();
  selected.forEach(c=>c.classList.add("wrong"));
  setTimeout(()=>selected.forEach(c=>c.classList.remove("selected","wrong")),400);
 }

 selected=[];

 if(found.length===words.length || attempts === 0){
  endGame();
 }
}

function endGame(){
 gameOver = true;
 document.getElementById("submitBox").style.display="block";
}

/* 🔒 CODE */
function generateCode(){
 return btoa(score+"-"+time+"-"+attempts);
}

function submitScore(){
 let name=document.getElementById("name").value;
 let phone=document.getElementById("phone").value;

 let code=generateCode();

 let msg=`VAT Game Result:
Name:${name}
Phone:${phone}
Score:${score}
Time:${time}s
Code:${code}`;

 window.open(`https://wa.me/231777136993?text=${encodeURIComponent(msg)}`);
}

/* 🔐 ADMIN ACCESS */
document.addEventListener("keydown", function(e){
 if(e.ctrlKey && e.key === "a"){
  let pass = prompt("Enter Admin Key");
  if(pass === "admin123"){
    document.getElementById("adminBox").style.display="block";
  }
 }
});

/* 🔍 VERIFY */
function verifyCode(){
 let code=document.getElementById("codeInput").value;

 try{
  let decoded=atob(code);
  let parts=decoded.split("-");
  document.getElementById("result").innerText =
   "Score: "+parts[0]+" | Time: "+parts[1]+"s | Attempts left: "+parts[2];
 }catch{
  document.getElementById("result").innerText="Invalid Code!";
 }
}
</script>

</body>
</html>

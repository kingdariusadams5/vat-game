<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LRA VAT Game</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(135deg,#0b3d91,#1452cc);
    color: white;
    margin:0;
}

.header {
    background:#002b7f;
    padding:10px;
}

.logo { width:70px; }

.grid {
    display:grid;
    grid-template-columns:repeat(12,30px);
    gap:4px;
    justify-content:center;
    margin:15px;
}

.cell {
    width:30px;
    height:30px;
    background:white;
    color:black;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    border-radius:6px;
    cursor:pointer;
    user-select:none;
}

.cell.selected { background: gold; }
.cell.found { background: limegreen; color:white; }
.cell.wrong { background: red; color:white; }

.info-box {
    background:#002b7f;
    padding:10px;
    border-radius:10px;
}

#submitBox { display:none; margin-top:20px; }

input { padding:10px; width:220px; border-radius:6px; border:none; }

button { padding:10px 20px; background:orange; border:none; border-radius:6px; }

#leaderboard {
    margin:20px auto;
    background:white;
    color:black;
    padding:15px;
    border-radius:14px;
    width:90%;
    max-width:420px;
}

.player {
    display:flex;
    justify-content:space-between;
    padding:6px;
}

@media(max-width:600px){
.grid{grid-template-columns:repeat(12,24px);}
.cell{width:24px;height:24px;font-size:12px;}
}
</style>
</head>

<body>

<div class="header">
<img src="lra-logo.png" class="logo">
<h2>LRA VAT Word Game</h2>
</div>

<div class="info-box">
⏱️ <span id="time">0</span>s |
🎯 Score: <span id="score">0</span> |
🎯 Attempts: <span id="attempts">10</span>
</div>

<div class="grid" id="grid"></div>

<div id="submitBox">
<input id="name" placeholder="Full Name"><br><br>
<input id="phone" placeholder="Phone"><br><br>
<button onclick="submitScore()">Submit</button>
</div>

<div id="leaderboard">
<h3>🏆 Top Players</h3>
<div id="boardList"></div>
</div>

<!-- ADMIN -->
<div id="adminBox" style="display:none;background:#fff;color:#000;padding:10px;margin:20px;">
<input id="codeInput" placeholder="Paste Code"><br><br>
<button onclick="verifyCode()">Verify</button>
<p id="result"></p>
</div>

<script>
const correctSound=new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
const wrongSound=new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

const words=["VAT","TAX","GOODS","SERVICES","INVOICE","REVENUE","PAYMENT","REGISTER","SALES","CUSTOMER"];

const letters=[ /* same letters */ 
"C","U","S","T","O","M","E","R","X","Y","Z","A",
"R","T","X","A","T","G","H","J","K","L","M","N",
"E","V","A","T","O","P","Q","R","S","T","U","V",
"C","W","X","Y","Z","G","O","O","D","S","A","B",
"E","R","T","Y","U","I","O","P","Q","R","C","D",
"I","N","V","O","I","C","E","L","M","N","E","F",
"P","O","I","U","Y","T","R","E","W","Q","I","G",
"T","R","E","G","I","S","T","E","R","H","V","H",
"S","A","L","E","S","D","F","G","H","I","R","I",
"E","D","C","B","A","Z","X","C","V","B","O","J",
"M","N","O","P","A","Y","M","E","N","T","K","K",
"O","L","K","J","H","G","F","D","S","A","E","L"
];

let score=0,attempts=10,found=[],selected=[],drag=false,gameOver=false;

let time=0;
setInterval(()=>{if(!gameOver){time++;timeEl.innerText=time}},1000);

const timeEl=document.getElementById("time");
const grid=document.getElementById("grid");

letters.forEach(l=>{
 let c=document.createElement("div");
 c.className="cell";
 c.innerText=l;

 c.onmousedown=()=>{if(!gameOver){drag=true;select(c)}};
 c.onmouseover=()=>{if(drag&&!gameOver)select(c)};
 document.onmouseup=check;

 c.ontouchstart=(e)=>{if(gameOver)return;e.preventDefault();drag=true;select(c)};
 c.ontouchmove=(e)=>{if(gameOver)return;let t=e.touches[0];let el=document.elementFromPoint(t.clientX,t.clientY);if(el&&el.classList.contains("cell"))select(el)};
 document.ontouchend=check;

 grid.appendChild(c);
});

function select(c){
 if(!c.classList.contains("selected")){
  c.classList.add("selected");
  selected.push(c);
 }
}

function check(){
 if(gameOver) return;
 drag=false;
 if(selected.length===0) return;

 let word=selected.map(c=>c.innerText).join("");

 attempts--;
 if(attempts<0) attempts=0;
 document.getElementById("attempts").innerText=attempts;

 if(words.includes(word)&&!found.includes(word)){
  found.push(word);
  score+=10;
  document.getElementById("score").innerText=score;
  correctSound.play();
  selected.forEach(c=>{c.classList.remove("selected");c.classList.add("found")});
 }else{
  wrongSound.play();
  selected.forEach(c=>c.classList.add("wrong"));
  setTimeout(()=>selected.forEach(c=>c.classList.remove("selected","wrong")),400);
 }

 selected=[];

 if(found.length===words.length||attempts===0){
  gameOver=true;
  document.getElementById("submitBox").style.display="block";
 }
}

function generateCode(){
 return btoa(score+"-"+time+"-"+attempts);
}

function submitScore(){
 let name=document.getElementById("name").value;
 let phone=document.getElementById("phone").value;

 let code=generateCode();

 let board=JSON.parse(localStorage.getItem("board")||"[]");

 board.push({name,score,time});
 board.sort((a,b)=>b.score-a.score||a.time-b.time);

 localStorage.setItem("board",JSON.stringify(board));

 showBoard();

 let msg=`VAT Game Result:
Name:${name}
Phone:${phone}
Score:${score}
Time:${time}s
Code:${code}`;

 window.open(`https://wa.me/231777136993?text=${encodeURIComponent(msg)}`);
}

function showBoard(){
 let board=JSON.parse(localStorage.getItem("board")||"[]");

 let html="";
 board.forEach((p,i)=>{
  let medal=i==0?"🥇":i==1?"🥈":i==2?"🥉":"";
  html+=`<div class="player">${medal} ${p.name} - ${p.score}% (${p.time}s)</div>`;
 });

 document.getElementById("boardList").innerHTML=html;
}

// admin access
if(location.search.includes("admin=1")){
 document.getElementById("adminBox").style.display="block";
}

function verifyCode(){
 let code=document.getElementById("codeInput").value;
 try{
  let d=atob(code).split("-");
  document.getElementById("result").innerText=`Score:${d[0]} Time:${d[1]} Attempts:${d[2]}`;
 }catch{
  document.getElementById("result").innerText="Invalid";
 }
}

showBoard();
</script>

</body>
</html>

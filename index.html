<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LRA VAT Game</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(135deg,#0b3d91,#1452cc);
    color: white;
    margin:0;
}

.header { background:#002b7f; padding:10px; }
.logo { width:70px; }

.grid {
    display:grid;
    grid-template-columns:repeat(12,30px);
    gap:4px;
    justify-content:center;
    margin:15px;
}

.cell {
    width:30px;
    height:30px;
    background:white;
    color:black;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    border-radius:6px;
    cursor:pointer;
    user-select:none;
}

.cell.selected { background: gold; }
.cell.found { background: limegreen; color:white; }
.cell.wrong { background: red; color:white; }

.info-box {
    background:#002b7f;
    padding:10px;
    border-radius:10px;
}

#submitBox { display:none; margin-top:20px; }

input { padding:10px; width:220px; border-radius:6px; border:none; }

button { padding:10px 20px; background:orange; border:none; border-radius:6px; }

#leaderboard {
    margin:20px auto;
    background:white;
    color:black;
    padding:15px;
    border-radius:14px;
    width:90%;
    max-width:420px;
}

.player {
    display:flex;
    justify-content:space-between;
    padding:6px;
}

/* 🔥 WORD LIST STYLE */
#wordList {
    margin-top:10px;
    font-weight:bold;
    padding:10px;
}

@media(max-width:600px){
.grid{grid-template-columns:repeat(12,24px);}
.cell{width:24px;height:24px;font-size:12px;}
}
</style>
</head>

<body>

<div class="header">
<img src="lra-logo.png" class="logo">
<h2>LRA VAT Word Game</h2>
</div>

<div class="info-box">
⏱️ <span id="time">0</span>s |
🎯 Score: <span id="score">0</span> |
🎯 Attempts: <span id="attempts">10</span>
</div>

<div class="grid" id="grid"></div>

<!-- 🔥 WORD LIST -->
<p id="wordList"></p>

<div id="submitBox">
<input id="name" placeholder="Full Name"><br><br>
<input id="phone" placeholder="Phone"><br><br>
<button onclick="submitScore()">Submit</button>
</div>

<div id="leaderboard">
<h3>🏆 Top Players</h3>
<div id="boardList"></div>
</div>

<!-- ADMIN -->
<div id="adminBox" style="display:none;background:#fff;color:#000;padding:10px;margin:20px;">
<input id="codeInput" placeholder="Paste Code"><br><br>
<button onclick="verifyCode()">Verify</button>
<p id="result"></p>
</div>

<script>
const correctSound=new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
const wrongSound=new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

// VAT WORD BANK
const allWords=[
"VAT","TAX","GOODS","SERVICES","INVOICE","REVENUE","PAYMENT","REGISTER",
"SALES","CUSTOMER","PRICE","VALUE","BUYER","SELLER","MARKET","INCOME",
"TRADE","BILL","LEVY","DUTY","IMPORT","EXPORT","BUSINESS","PROFIT",
"COST","ITEM","ACCOUNT","CHARGE","FEE","PURCHASE","RECEIPT","PRODUCT","CLIENT","STORE"
];

// RANDOM WORDS
function getWords(){
 return allWords.sort(()=>0.5-Math.random()).slice(0,10);
}

const words=getWords();

// 🔥 SHOW WORD LIST
document.getElementById("wordList").innerText="Find: "+words.join(", ");

// GRID
const size=12;
let gridArray=Array(size).fill().map(()=>Array(size).fill(""));

const dirs=[[0,1],[1,0],[0,-1],[-1,0]];

function place(word){
 let placed=false;
 while(!placed){
  let d=dirs[Math.floor(Math.random()*dirs.length)];
  let r=Math.floor(Math.random()*size);
  let c=Math.floor(Math.random()*size);

  let ok=true;
  for(let i=0;i<word.length;i++){
   let nr=r+d[0]*i, nc=c+d[1]*i;
   if(nr<0||nc<0||nr>=size||nc>=size|| (gridArray[nr][nc]!=="" && gridArray[nr][nc]!==word[i])){
    ok=false; break;
   }
  }

  if(ok){
   for(let i=0;i<word.length;i++){
    let nr=r+d[0]*i, nc=c+d[1]*i;
    gridArray[nr][nc]=word[i];
   }
   placed=true;
  }
 }
}

words.forEach(w=>place(w));

const letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
for(let r=0;r<size;r++){
 for(let c=0;c<size;c++){
  if(gridArray[r][c]==""){
   gridArray[r][c]=letters[Math.floor(Math.random()*26)];
  }
 }
}

const flat=gridArray.flat();

let score=0,attempts=10,found=[],selected=[],drag=false,gameOver=false;

// TIMER
let time=0;
setInterval(()=>{if(!gameOver){time++;document.getElementById("time").innerText=time}},1000);

// GRID RENDER
const grid=document.getElementById("grid");
flat.forEach(l=>{
 let cell=document.createElement("div");
 cell.className="cell";
 cell.innerText=l;

 cell.onmousedown=()=>{if(!gameOver){drag=true;select(cell)}};
 cell.onmouseover=()=>{if(drag&&!gameOver)select(cell)};
 document.onmouseup=check;

 cell.ontouchstart=(e)=>{if(gameOver)return;e.preventDefault();drag=true;select(cell)};
 cell.ontouchmove=(e)=>{
  if(gameOver)return;
  let t=e.touches[0];
  let el=document.elementFromPoint(t.clientX,t.clientY);
  if(el && el.classList.contains("cell")) select(el);
 };
 document.ontouchend=check;

 grid.appendChild(cell);
});

function select(c){
 if(!c.classList.contains("selected")){
  c.classList.add("selected");
  selected.push(c);
 }
}

function check(){
 if(gameOver) return;
 drag=false;
 if(selected.length===0) return;

 let word=selected.map(c=>c.innerText).join("");

 attempts--;
 if(attempts<0) attempts=0;
 document.getElementById("attempts").innerText=attempts;

 if(words.includes(word)&&!found.includes(word)){
  found.push(word);
  score+=10;
  document.getElementById("score").innerText=score;
  correctSound.play();
  selected.forEach(c=>{c.classList.remove("selected");c.classList.add("found")});
 }else{
  wrongSound.play();
  selected.forEach(c=>c.classList.add("wrong"));
  setTimeout(()=>selected.forEach(c=>c.classList.remove("selected","wrong")),400);
 }

 selected=[];

 if(found.length===words.length||attempts===0){
  gameOver=true;
  document.getElementById("submitBox").style.display="block";
 }
}

// CODE
function generateCode(){
 return btoa(score+"-"+time+"-"+attempts);
}

// SUBMIT
function submitScore(){
 let name=document.getElementById("name").value;
 let phone=document.getElementById("phone").value;

 let code=generateCode();

 let board=JSON.parse(localStorage.getItem("board")||"[]");
 board.push({name,score,time});
 board.sort((a,b)=>b.score-a.score||a.time-b.time);
 localStorage.setItem("board",JSON.stringify(board));

 showBoard();

 let msg=`VAT Game Result:
Name:${name}
Phone:${phone}
Score:${score}
Time:${time}s
Code:${code}`;

 window.open(`https://wa.me/231777136993?text=${encodeURIComponent(msg)}`);
}

// LEADERBOARD
function showBoard(){
 let board=JSON.parse(localStorage.getItem("board")||"[]");
 let html="";
 board.forEach((p,i)=>{
  let medal=i==0?"🥇":i==1?"🥈":i==2?"🥉":"";
  html+=`<div class="player">${medal} ${p.name} - ${p.score}% (${p.time}s)</div>`;
 });
 document.getElementById("boardList").innerHTML=html;
}

// ADMIN
document.addEventListener("keydown", function(e){
 if(e.ctrlKey && e.shiftKey && e.key.toLowerCase()==="a"){
  let pass=prompt("Enter Admin Key");
  if(pass==="admin123"){
   document.getElementById("adminBox").style.display="block";
  }
 }
});

if(location.search.includes("admin=1")){
 document.getElementById("adminBox").style.display="block";
}

function verifyCode(){
 let code=document.getElementById("codeInput").value;
 try{
  let d=atob(code).split("-");
  document.getElementById("result").innerText=`Score:${d[0]} Time:${d[1]} Attempts:${d[2]}`;
 }catch{
  document.getElementById("result").innerText="Invalid";
 }
}

showBoard();
</script>

</body>
</html>
